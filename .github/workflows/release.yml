name: Release

# Publish @codeyogi911/weave to GitHub Packages on a version tag.
# Uses the auto GITHUB_TOKEN (packages: write) — no manual npm token needed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@codeyogi911"
      - run: npm install
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
